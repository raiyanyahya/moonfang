name: Release

# Build the desktop distributions and attach them to a GitHub Release.
# Trigger by pushing a version tag:
#     git tag v1.0.0 && git push origin v1.0.0
# or run it by hand from the Actions tab (provide the tag to release).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0). Created at the current commit if it does not exist.'
        required: true

# action-gh-release needs write access to create the release and upload assets.
permissions:
  contents: write

jobs:
  linux:
    name: Build & release (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `npm run dist` == `electron-builder --linux` (AppImage + tar.gz, per package.json).
      # `--publish never` keeps electron-builder from trying to publish itself — the
      # upload is done explicitly below so it is easy to see and change.
      - name: Build distributions
        run: npm run dist -- --publish never

      - name: List build output
        run: ls -lh dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Moonfang Castle ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.AppImage
            dist/*.tar.gz
