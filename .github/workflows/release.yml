name: Release

# Build the desktop distributions on each OS's native runner and attach them
# to a single GitHub Release. Trigger by pushing a version tag:
#     git tag v1.0.0 && git push origin v1.0.0
# or run it by hand from the Actions tab (provide the tag to release).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0). Created at the current commit if it does not exist.'
        required: true

# action-gh-release needs write access to create the release and upload assets.
permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest       # → AppImage + tar.gz
            artifacts: |
              dist/*.AppImage
              dist/*.tar.gz
          - os: windows-latest      # → NSIS installer (.exe)
            artifacts: dist/*.exe
          - os: macos-latest        # → .dmg (Apple Silicon runner → arm64)
            artifacts: dist/*.dmg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # No platform flag → electron-builder builds for the host OS using the
      # matching win / mac / linux block in package.json. `--publish never`
      # leaves publishing to the release job below.
      - name: Build distribution
        run: npx electron-builder --publish never
        env:
          # Unsigned macOS build — don't hunt for a signing identity on CI.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List build output
        shell: bash
        run: ls -lh dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: ls -lh release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Moonfang Castle ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-assets/*
