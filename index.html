<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Moonfang Castle</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
  html, body {
    margin: 0; padding: 0;
    background: #08060f;
    color: #8a83a8;
    font-family: monospace;
    height: 100%;
    overflow: hidden;
    /* stop mobile scroll / rubber-band / pinch-zoom on the game surface */
    touch-action: none;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
  }
  /* on touch devices the game fills the full width — drop the desktop frame chrome
     and anchor the frame to the top-left so the top HUD is never cropped
     (the 16:9 canvas is taller than the screen, so it overflows off the bottom). */
  html.touch #frame { border: 0; box-shadow: none; position: fixed; top: 0; left: 0; }
  html.touch body { display: block; }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #frame {
    position: relative;
    line-height: 0;
    border: 2px solid #241d3d;
    box-shadow: 0 0 60px rgba(90, 50, 160, .25), 0 0 12px rgba(0,0,0,.8) inset;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #000;
    display: block;
  }
  /* subtle scanlines */
  #frame::after {
    content: "";
    position: absolute; inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
      rgba(0,0,0,.12) 2px, rgba(0,0,0,.12) 3px
    );
  }
</style>
</head>
<body>
  <div id="frame"><canvas id="screen" width="960" height="540"></canvas></div>
  <script>
    // Touch-first devices (phones/tablets) get the on-screen controls and full-bleed scaling.
    // ?touch=1 / ?touch=0 forces it on/off for testing on a desktop.
    (function () {
      const q = new URLSearchParams(location.search).get('touch');
      window.TOUCH = q === '1' ? true : q === '0' ? false
        : (window.matchMedia && matchMedia('(pointer: coarse)').matches) || false;
      if (window.TOUCH) document.documentElement.classList.add('touch');
    })();

    // fill the window at any size; pixelated rendering keeps it crisp
    (function () {
      const cv = document.getElementById('screen');
      function fit() {
        // the *visible* viewport (excludes the mobile URL bar; tracks orientation)
        const vp = window.visualViewport;
        const vw = vp ? vp.width : window.innerWidth;
        const vh = vp ? vp.height : window.innerHeight;
        if (window.TOUCH) {
          // Fill the full width; the 16:9 canvas is taller than the phone screen,
          // so it overflows off the bottom (frame is top-anchored → HUD stays visible).
          const scale = vw / 960;
          cv.style.width = Math.round(vw) + 'px';
          cv.style.height = Math.round(540 * scale) + 'px';
          return;
        }
        // desktop: fit the whole frame with a little breathing room
        const s = Math.min((vw - 8) / 960, (vh - 40) / 540);
        // snap to integers when within 6% of one (perfect pixels),
        // otherwise scale smoothly so the game always fills the window
        const near = Math.round(s);
        const scale = Math.abs(s - near) < 0.06 && near >= 1 ? near : s;
        cv.style.width = Math.round(960 * scale) + 'px';
        cv.style.height = Math.round(540 * scale) + 'px';
      }
      window.fitCanvas = fit;
      window.addEventListener('resize', fit);
      // mobile browsers report stale sizes right after a rotation — re-fit shortly after
      window.addEventListener('orientationchange', () => { fit(); setTimeout(fit, 250); });
      if (window.visualViewport) window.visualViewport.addEventListener('resize', fit);
      fit();
    })();
  </script>
  <script src="js/config.js"></script>
  <script src="js/font.js"></script>
  <script src="js/sprites.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/level.js"></script>
  <script src="js/systems.js"></script>
  <script src="js/projectiles.js"></script>
  <script src="js/pickups.js"></script>
  <script src="js/enemies.js"></script>
  <script src="js/bosses.js"></script>
  <script src="js/player.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/game.js"></script>
  <script src="js/touch.js"></script>
</body>
</html>
